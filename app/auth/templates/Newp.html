{% extends 'baselogin.html' %}

{% block title %} Nueva Contraseña {% endblock %}

{% block content %}
<div class="form-container">
    <h2>Nueva Contraseña</h2>
    <p style="color: #666; margin-bottom: 2rem; font-size: 0.95rem; font-weight: 500; line-height: 1.5;">
        Crea una contraseña segura para tu cuenta. Te recomendamos usar una combinación de letras, números y símbolos.
    </p>
    <form id="newpForm" novalidate>
        <div class="form-group">
            <label for="password">Nueva contraseña</label>
            <input type="password" id="password" name="password" placeholder="*************" required>
        </div>
        
        <div class="form-group">
            <label for="confirm_password">Confirmar contraseña</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="*************" required>
        </div>
        
        <div class="form-actions" style="margin-top: 2.5rem;">
            <button type="submit" class="btn-signup" style="width: 100%;">Actualizar contraseña</button>
        </div>
    </form>
</div>

<script>
    document.getElementById('newpForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const pwd = document.getElementById('password').value;
        const confirmPwd = document.getElementById('confirm_password').value;

        if (!pwd || !confirmPwd) {
            Swal.fire({
                title: '¡Campos vacíos!',
                text: 'Por favor completa ambos campos con tu nueva contraseña.',
                icon: 'warning',
                confirmButtonColor: '#0070a8'
            });
            return;
        }

        if (pwd !== confirmPwd) {
            Swal.fire({
                title: 'Error de coincidencia',
                text: 'Las contraseñas no coinciden. Por favor, asegúrate de colocarlas igual.',
                icon: 'error',
                confirmButtonColor: '#0070a8'
            });
            return;
        }

        Swal.fire({
            title: '¡Actualizado!',
            text: 'Tu contraseña se ha configurado de manera segura.',
            icon: 'success',
            confirmButtonColor: '#0070a8',
            confirmButtonText: 'Ir a Iniciar Sesión',
            timer: 3500
        }).then(() => {
            window.location.href = "{{ url_for('autenticar.login') }}";
        });
    });
</script>
{% endblock %}
